name: Release

# Trigger on tags like v0.5.0, v0.5.1, v1.0.0 等。
# 同时发到 PyPI (trusted publishing via OIDC) 和 GHCR Docker image。
#
# PyPI 侧配置 (一次性):
#   1. 在 https://pypi.org/manage/account/publishing/ 配 trusted publisher
#   2. project name: kuake-pipe
#   3. workflow filename: release.yml
#   4. environment name: pypi (本 workflow 使用)
#   5. 完成后 push tag 自动发布,不需要 API token 配 secret

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC, 取代 API token
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # 若 PyPI 侧未配 trusted publisher, 该步会失败但其它 job 不受影响

  publish-ghcr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: meta
        run: |
          # tag v0.5.0 → version 0.5.0
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          echo "repo_lower=$REPO_LOWER" >> "$GITHUB_OUTPUT"
      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.repo_lower }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # 找到 "## [VERSION]" 段落, 直到下一个 "## [" 之前
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > section.md
          # GitHub Actions multiline output
          {
            echo "body<<EOF"
            cat section.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
